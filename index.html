<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeDelay Status Dashboard</title>
  <style>
    /* Theme Variables - Dark Mode (default) */
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f0f23;
      --text-primary: #eee;
      --text-secondary: #aaa;
      --text-muted: #666;
      --border: #333;
      --accent: #f39c12;
      --accent-hover: #e67e22;
      --success: #27ae60;
      --error: #e74c3c;
      --error-bg: #2c0b0e;
      --locked: #e74c3c;
      --unlocked: #27ae60;
    }
    
    /* Light Theme */
    [data-theme="light"] {
      --bg-primary: #f5f6fa;
      --bg-secondary: #e8e8e8;
      --bg-card: #ffffff;
      --text-primary: #2c3e50;
      --text-secondary: #7f8c8d;
      --text-muted: #95a5a6;
      --border: #ddd;
      --accent: #f39c12;
      --accent-hover: #e67e22;
      --success: #27ae60;
      --error: #e74c3c;
      --error-bg: #fadbd8;
      --locked: #e74c3c;
      --unlocked: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      min-height: 100vh;
      color: var(--text-primary);
      padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    /* Header with Theme Toggle */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .header h1 { margin-bottom: 0; }
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background 0.2s;
      color: var(--text-primary);
    }
    .theme-toggle:hover { background: var(--border); }
    h1 { text-align: center; margin-bottom: 2rem; font-size: 2rem; }
    h1 span { color: var(--accent); }
    .search-box {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }
    .search-box label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; }
    .input-group { display: flex; gap: 0.5rem; }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a2e;
      color: var(--text-primary);
      font-family: monospace;
    }
    input:focus { outline: none; border-color: #f39c12; }
    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #f39c12;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #e67e22; }
    button:disabled { background: #666; cursor: not-allowed; }
    .results { display: flex; flex-direction: column; gap: 1rem; }
    .lock-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }
    .lock-card.active { border-color: #27ae60; }
    .lock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .lock-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .lock-status.active { background: #27ae60; color: var(--text-primary); }
    .lock-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .detail-item { background: #1a1a2e; padding: 0.75rem; border-radius: 8px; }
    .detail-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.25rem; }
    .detail-value { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
    .detail-value.bch { color: #f39c12; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .loading { text-align: center; padding: 2rem; color: #f39c12; }
    .error { background: #2c0b0e; border: 1px solid #e74c3c; color: #e74c3c; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
    .contract-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .contract-tabs button {
      flex: 1;
      padding: 0.75rem;
      background: #1a1a2e;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .contract-tabs button.active {
      background: #f39c12;
      color: #000;
      border-color: #f39c12;
    }
    .contract-tabs button:hover:not(.active) { border-color: #f39c12; }
    .nft-detail { background: #1a1a2e; padding: 0.5rem; border-radius: 6px; margin-top: 0.5rem; font-size: 0.85rem; }
    .nft-flag { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-right: 0.5rem; }
    .nft-flag.locked { background: #e74c3c; color: var(--text-primary); }
    .nft-flag.withdrawing { background: #f39c12; color: #000; }
    .nft-flag.extended { background: #3498db; color: var(--text-primary); }
    .action-buttons { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .action-buttons button { font-size: 0.85rem; padding: 0.5rem 1rem; }
    .detail-value.locked { color: #e74c3c; }
    .detail-value.unlocked { color: #27ae60; }
    .countdown { font-family: monospace; font-size: 1.2rem; color: #f39c12; }
    .utxo-list { margin-top: 1.5rem; }
    .utxo-item { background: #1a1a2e; padding: 1rem; border-radius: 8px; margin-bottom: 0.75rem; border-left: 3px solid #f39c12; }
    .utxo-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .utxo-amount { font-weight: 600; color: #f39c12; }
    .utxo-txid { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; word-break: break-all; }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; justify-content: center; }
    .toolbar button { font-size: 0.85rem; padding: 0.5rem 1rem; }
    .toolbar button.secondary { background: #34495e; color: var(--text-primary); }
    .toolbar button.secondary:hover { background: #2c3e50; }
    .import-section { display: none; margin-top: 1rem; padding: 1rem; background: #1a1a2e; border-radius: 8px; }
    .import-section.active { display: block; }
    .import-section input[type="file"] { margin-top: 0.5rem; }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 1rem 1.5rem; background: #27ae60; color: var(--text-primary); border-radius: 8px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .toast.error { background: #e74c3c; }
    .dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .dialog-overlay.active { display: flex; }
    .dialog { background: var(--bg-card); padding: 2rem; border-radius: 12px; max-width: 400px; text-align: center; }
    .dialog h3 { margin-bottom: 1rem; }
    .dialog p { margin-bottom: 1.5rem; color: var(--text-secondary); }
    .dialog-buttons { display: flex; gap: 1rem; justify-content: center; }
    .dialog-buttons button { min-width: 100px; }
    .dialog-buttons button.cancel { background: #34495e; color: var(--text-primary); }
    .analytics-section { margin-top: 1.5rem; }
    .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .analytics-card { background: #1a1a2e; padding: 1.25rem; border-radius: 10px; text-align: center; }
    .analytics-card .label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.5rem; }
    .analytics-card .value { font-size: 1.5rem; font-weight: 700; }
    .analytics-card .value.bch { color: #f39c12; }
    .analytics-card .value.green { color: #27ae60; }
    .analytics-card .value.red { color: #e74c3c; }
    .timeline-section { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-top: 1.5rem; }
    .timeline-section h3 { color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 1rem; }
    .timeline-bar { position: relative; height: 40px; background: #1a1a2e; border-radius: 8px; overflow: hidden; margin-bottom: 0.75rem; }
    .timeline-segment { position: absolute; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: var(--text-primary); overflow: hidden; white-space: nowrap; transition: all 0.3s; }
    .timeline-segment:hover { filter: brightness(1.2); z-index: 10; }
    .timeline-segment.locked { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    .timeline-segment.unlocked { background: linear-gradient(90deg, #27ae60, #1e8449); }
    .timeline-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); }
    .timeline-legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1rem; font-size: 0.8rem; }
    .timeline-legend-item { display: flex; align-items: center; gap: 0.5rem; }
    .timeline-legend-color { width: 12px; height: 12px; border-radius: 3px; }
    .fee-estimate { background: #1a1a2e; padding: 1rem; border-radius: 8px; margin-top: 1rem; border-left: 3px solid #f39c12; }
    .fee-estimate .title { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .fee-estimate .amount { font-size: 1.1rem; color: #f39c12; font-weight: 600; }
    .create-section { display: none; }
    .create-section.active { display: block; }
    .contract-type-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
    .contract-type-card { background: var(--bg-card); padding: 0.85rem; border-radius: 8px; border: 2px solid #333; cursor: pointer; transition: all 0.2s; }
    .contract-type-card:hover { border-color: #f39c12; }
    .contract-type-card.selected { border-color: #f39c12; background: #1a1a2e; }
    .contract-type-card h4 { color: #f39c12; margin-bottom: 0.35rem; font-size: 0.9rem; }
    .contract-type-card p { font-size: 0.75rem; color: var(--text-secondary); margin: 0; }
    .create-form { background: #1a1a2e; padding: 1rem; border-radius: 8px; }
    .create-form .form-group { margin-bottom: 0.85rem; }
    .create-form .form-group label { display: block; margin-bottom: 0.35rem; color: var(--text-secondary); font-size: 0.8rem; }
    .create-form input, .create-form select { width: 100%; padding: 0.5rem; font-size: 0.85rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-help { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.2rem; }
    .generated-address { background: var(--bg-card); padding: 1rem; border-radius: 8px; margin-top: 1rem; border: 2px solid #27ae60; }
    .generated-address h4 { color: #27ae60; margin: 0 0 0.5rem 0; font-size: 1rem; }
    .address-display { background: #1a1a2e; padding: 0.6rem; border-radius: 6px; word-break: break-all; font-family: monospace; font-size: 0.75rem; color: var(--text-primary); margin-bottom: 0.6rem; }
    .address-actions { display: flex; gap: 0.4rem; }
    .address-actions button { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
  </style>
</head>
<body onload="initTheme()">
  <div class="container">
    <div class="header">
    <h1>SafeDelay <span>Dashboard</span></h1>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">🌙</button>
  </div>
    <div class="search-box">
      <div class="contract-tabs">
        <button id="tab-std" class="active" onclick="showView('check')">Check Locks</button>
        <button id="tab-create" onclick="showView('create')">Create Contract</button>
      </div>
      <div class="toolbar">
        <button class="secondary" onclick="exportLocks()">📤 Export Locks</button>
        <button class="secondary" onclick="showImportSection()">📥 Import Locks</button>
      </div>
      <div class="import-section" id="importSection">
        <label>Select a JSON file to import locks:</label>
        <input type="file" id="importFile" accept=".json" onchange="importLocks()" />
      </div>
      <div class="network-select">
        <select id="network">
          <option value="mainnet">Mainnet</option>
          <option value="testnet">Testnet</option>
        </select>
      </div>
      <label for="address" id="addressLabel">Enter address to check SafeDelay locks:</label>
      <div class="input-group">
        <input type="text" id="address" placeholder="bitcoincash:..." />
        <button id="searchBtn" onclick="checkLocks()">Check</button>
      </div>
    </div>
    
    <!-- Create Contract Section -->
    <div id="createSection" class="create-section">
      <div class="search-box">
        <h2 style="margin-bottom: 1rem; color: #f39c12; font-size: 1.25rem;">Create SafeDelay Contract</h2>
        <label style="margin-bottom: 0.5rem; display: block;">Contract Type:</label>
        <div class="contract-type-selector">
          <div class="contract-type-card selected" data-type="std" onclick="selectContractType('std')">
            <h4>Standard</h4>
            <p>Time-locked wallet</p>
          </div>
          <div class="contract-type-card" data-type="nft" onclick="selectContractType('nft')">
            <h4>NFT</h4>
            <p>NFT deposits + emergency</p>
          </div>
          <div class="contract-type-card" data-type="multisig" onclick="selectContractType('multisig')">
            <h4>MultiSig</h4>
            <p>Multi-signature</p>
          </div>
          <div class="contract-type-card" data-type="streaming" onclick="selectContractType('streaming')">
            <h4>Streaming</h4>
            <p>Gradual release</p>
          </div>
        </div>
        <div id="contractForm"></div>
        <div class="generated-address" id="generatedAddress" style="display:none;">
          <h4>Ready to Fund!</h4>
          <p style="color:#aaa;font-size:0.8rem;margin-bottom:0.5rem;">Send BCH to this address:</p>
          <div class="address-display" id="addressDisplay"></div>
          <div class="address-actions">
            <button onclick="copyAddress()">Copy</button>
            <button class="secondary" onclick="saveContract()">Save</button>
          </div>
        </div>
      </div>
    </div>

    <div id="error"></div>
    <div id="loading" class="loading" style="display: none;">Checking for SafeDelay locks...</div>
    <div id="results" class="results"></div>
  </div>

  <script>
    const ELECTRUM_SERVERS = {
      mainnet: { host: 'electrum.bch.cash', port: 50001 },
      testnet: { host: 'electrum-test.bch.cash', port: 60001 }
    };

    let currentServer = null;
    let currentBlockHeight = null;
    let currentContract = 'std';
    let height = 0;

    function selectContract(type) {
      currentContract = type;
      document.getElementById('tab-std').classList.toggle('active', type === 'std');
      document.getElementById('tab-nft').classList.toggle('active', type === 'nft');
      document.getElementById('addressLabel').textContent = type === 'nft' 
        ? 'Enter address to check SafeDelay NFT locks:'
        : 'Enter address to check SafeDelay locks:';
      document.getElementById('results').innerHTML = '';
    }

    // Decode NFT commitment for SafeDelay_NFT
    // Format: [optional data...] [extendedBlocks?] [flag]
    // flag: 0x00 = locked, 0x01 = withdrawing, 0x02 = extended
    function decodeNFTCommitment(commitmentHex) {
      if (!commitmentHex || commitmentHex.length < 2) return null;
      
      try {
        const bytes = commitmentHex.match(/.{1,2}/g).map(b => parseInt(b, 16));
        const flag = bytes[bytes.length - 1];
        
        if (flag === 0x00) {
          return { flag: 'locked', flagHex: '0x00', extendedBlocks: 0 };
        } else if (flag === 0x01) {
          return { flag: 'withdrawing', flagHex: '0x01', extendedBlocks: 0 };
        } else if (flag === 0x02) {
          const extendedBlocks = bytes.length >= 2 ? bytes[bytes.length - 2] : 0;
          return { flag: 'extended', flagHex: '0x02', extendedBlocks };
        }
        return { flag: 'unknown', flagHex: '0x' + flag.toString(16), extendedBlocks: 0 };
      } catch (e) {
        console.error('NFT decode error:', e);
        return null;
      }
    }

    // Decode lockEndBlock from SafeDelay contract bytecode
    // SafeDelay bytecode: constructor args at end - lockEndBlock (varint) + ownerPKH (20 bytes)
    function decodeLockEndBlock(scriptHex) {
      try {
        const script = scriptHex.toLowerCase();
        
        // Search backwards from end, skip potential ownerPKH (20 bytes = 40 hex chars)
        for (let offset = 42; offset <= 50; offset += 2) {
          if (script.length < offset + 4) continue;
          
          const blockHex = script.slice(script.length - offset - 4, script.length - offset);
          const blockLE = blockHex.match(/.{1,2}/g).reverse().join('');
          const blockNum = parseInt(blockLE, 16);
          
          // Sanity check: reasonable block number (100 to 10 million)
          if (blockNum > 100 && blockNum < 10000000) {
            const pkhStart = script.length - offset;
            const pkh = script.slice(pkhStart, pkhStart + 40);
            // Validate ownerPKH looks reasonable
            if (pkh !== '0'.repeat(40) && pkh !== 'f'.repeat(40)) {
              return { lockEndBlock: blockNum, ownerPKH: pkh };
            }
          }
        }
        return null;
      } catch (e) {
        console.error('Decode error:', e);
        return null;
      }
    }

    async function electrumCall(method, params = []) {
      const response = await fetch('https://' + currentServer.host + ':' + currentServer.port, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: 1, method, params })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      return data.result;
    }

    async function checkLocks() {
      const address = document.getElementById('address').value.trim();
      const network = document.getElementById('network').value;
      const errorDiv = document.getElementById('error');
      const loadingDiv = document.getElementById('loading');
      const resultsDiv = document.getElementById('results');

      errorDiv.innerHTML = '';
      resultsDiv.innerHTML = '';

      if (!address) {
        errorDiv.innerHTML = '<div class="error">Please enter an address</div>';
        return;
      }

      loadingDiv.style.display = 'block';
      document.getElementById('searchBtn').disabled = true;

      try {
        currentServer = ELECTRUM_SERVERS[network];
        
        // Get current block height
        try {
          height = await electrumCall('blockchain.headers.subscribe');
          height = height.height;
        } catch (e) {
          height = await electrumCall('blockchain.get.block.count');
        }
        
        const utxos = await electrumCall('blockchain.address.getUTXOs', [address]);
        
        if (!utxos || utxos.length === 0) {
          loadingDiv.style.display = 'none';
          resultsDiv.innerHTML = '<div class="empty-state"><p>No UTXOs found for this address.</p></div>';
          return;
        }

        // Find SafeDelay contracts (standard or NFT)
        const safeDelayUtxos = [];
        
        for (const utxo of utxos) {
          const script = utxo.script;
          if (!script) continue;
          
          // Check for NFT (has nftCommitment)
          const nftCommitment = utxo.nftCommitment;
          
          if (currentContract === 'nft' && nftCommitment) {
            // NFT contract - decode the commitment
            const decodedNFT = decodeNFTCommitment(nftCommitment);
            if (decodedNFT) {
              safeDelayUtxos.push({
                ...utxo,
                isContract: true,
                contractType: 'nft',
                nftData: decodedNFT,
                lockEndBlock: null, // NFTs use different mechanism
                ownerPKH: null
              });
            }
          } else if (currentContract === 'std') {
            // Standard SafeDelay - decode lockEndBlock from bytecode
            const decoded = decodeLockEndBlock(script);
            
            if (decoded && decoded.lockEndBlock) {
              safeDelayUtxos.push({
                ...utxo,
                lockEndBlock: decoded.lockEndBlock,
                ownerPKH: decoded.ownerPKH,
                isContract: true,
                contractType: 'std'
              });
            } else if (script.startsWith('76a914') && script.endsWith('88ac')) {
              safeDelayUtxos.push({
                ...utxo,
                lockEndBlock: null,
                ownerPKH: null,
                isContract: true,
                contractType: 'std'
              });
            }
          }
        }

        loadingDiv.style.display = 'none';

        if (safeDelayUtxos.length === 0) {
          const msg = currentContract === 'nft' 
            ? 'No SafeDelay NFT locks found for this address.'
            : 'No SafeDelay locks found for this address.';
          resultsDiv.innerHTML = `<div class="empty-state"><p>${msg}</p></div>`;
          return;
        }

        // Get current block height
        const currentBlock = await electrumCall('blockchain.headers.subscribe');
        const height = currentBlock.height;
        currentBlockHeight = height;

        // Display results
        let totalBCH = 0;
        let lockedBCH = 0;
        let unlockedBCH = 0;
        
        // Build individual UTXO display
        const contractTitle = currentContract === 'nft' ? 'SafeDelay NFT Locks' : 'SafeDelay Locks';
        let utxoHtml = '<div class="utxo-list"><h3 style="margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase;">Individual Locks</h3>';
        
        for (const utxo of safeDelayUtxos) {
          const bch = utxo.value / 100000000;
          totalBCH += bch;
          
          // For standard SafeDelay
          if (utxo.contractType === 'std') {
            const isLocked = !utxo.lockEndBlock || utxo.lockEndBlock > height;
            const remaining = utxo.lockEndBlock ? utxo.lockEndBlock - height : 0;
            
            if (isLocked) lockedBCH += bch;
            else unlockedBCH += bch;
            
            const shortTxId = utxo.txid ? utxo.txid.substring(0, 16) + '...' : 'unknown';
            
            utxoHtml += `
              <div class="utxo-item" style="border-left-color: ${isLocked ? '#e74c3c' : '#27ae60'};">
                <div class="utxo-header">
                  <span class="utxo-amount">${bch.toFixed(8)} BCH</span>
                  <span class="lock-status ${isLocked ? '' : 'active'}" style="background: ${isLocked ? '#e74c3c' : '#27ae60'};">
                    ${isLocked ? '🔒 Locked' : '✅ Unlocked'}
                  </span>
                </div>
                <div class="utxo-txid">TX: ${shortTxId}:${utxo.vout}</div>
                ${utxo.lockEndBlock ? `
                  <div style="margin-top: 0.5rem; font-size: 0.9rem;">
                    <span style="color: var(--text-secondary);">Lock End:</span> 
                    <span style="color: var(--text-primary);">Block ${utxo.lockEndBlock.toLocaleString()}</span>
                    ${isLocked ? `<span class="countdown" style="margin-left: 0.5rem;">(${remaining.toLocaleString()} blocks left)</span>` : ''}
                  </div>
                ` : '<div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">Lock end block unknown</div>'}
              </div>
            `;
          }
          // For NFT SafeDelay
          else if (utxo.contractType === 'nft' && utxo.nftData) {
            const nft = utxo.nftData;
            const isLocked = nft.flag === 'locked';
            const isWithdrawing = nft.flag === 'withdrawing';
            const isExtended = nft.flag === 'extended';
            
            if (isLocked) lockedBCH += bch;
            else unlockedBCH += bch;
            
            const shortTxId = utxo.txid ? utxo.txid.substring(0, 16) + '...' : 'unknown';
            
            let flagClass = 'locked';
            let flagLabel = '🔒 Locked';
            if (isWithdrawing) { flagClass = 'withdrawing'; flagLabel = '⏳ Withdrawing'; }
            else if (isExtended) { flagClass = 'extended'; flagLabel = '🔓 Extended'; }
            else if (!isLocked) { flagLabel = '✅ Unlocked'; }
            
            utxoHtml += `
              <div class="utxo-item" style="border-left-color: ${isLocked ? '#e74c3c' : '#27ae60'};">
                <div class="utxo-header">
                  <span class="utxo-amount">${bch.toFixed(8)} BCH</span>
                  <span class="nft-flag ${flagClass}">${flagLabel}</span>
                </div>
                <div class="utxo-txid">TX: ${shortTxId}:${utxo.vout}</div>
                <div class="nft-detail">
                  <span style="color: var(--text-secondary);">Flag:</span> ${nft.flagHex}
                  ${nft.extendedBlocks > 0 ? `<span style="color: var(--text-secondary); margin-left: 1rem;">Extended:</span> +${nft.extendedBlocks} blocks` : ''}
                  ${utxo.nftCommitment ? `<br><span style="color: var(--text-muted); font-size: 0.75rem;">Commitment: ${utxo.nftCommitment.substring(0, 32)}...</span>` : ''}
                </div>
                <div class="action-buttons">
                  <button onclick="alert('Deposit feature coming soon - requires transaction signing')">💰 Deposit</button>
                  <button onclick="alert('Extend feature coming soon - requires transaction signing')">⏰ Extend</button>
                  <button onclick="alert('Withdraw feature coming soon - requires transaction signing')">🏧 Withdraw</button>
                </div>
              </div>
            `;
          }
        }
        
        utxoHtml += '</div>';

        // Calculate analytics
        const avgLockRemaining = safeDelayUtxos.filter(u => u.lockEndBlock && u.lockEndBlock > height)
          .reduce((sum, u) => sum + (u.lockEndBlock - height), 0) / Math.max(safeDelayUtxos.filter(u => u.lockEndBlock && u.lockEndBlock > height).length, 1);
        const blocksPerDay = 144; // ~144 blocks per day on BCH
        const avgDaysRemaining = Math.round(avgLockRemaining / blocksPerDay);
        const earliestUnlock = safeDelayUtxos.filter(u => u.lockEndBlock && u.lockEndBlock > height)
          .sort((a, b) => a.lockEndBlock - b.lockEndBlock)[0];
        const latestLock = safeDelayUtxos.filter(u => u.lockEndBlock)
          .sort((a, b) => b.lockEndBlock - a.lockEndBlock)[0];
        
        // Build timeline visualization
        const minBlock = latestLock ? latestLock.lockEndBlock - (30 * blocksPerDay * 3) : height - (30 * blocksPerDay); // 3 months range
        const maxBlock = Math.max(height + (30 * blocksPerDay * 6), ...safeDelayUtxos.filter(u => u.lockEndBlock).map(u => u.lockEndBlock));
        const range = maxBlock - minBlock;
        
        let timelineHtml = '';
        if (safeDelayUtxos.length > 0 && safeDelayUtxos.some(u => u.lockEndBlock)) {
          const sortedUtxos = [...safeDelayUtxos].sort((a, b) => (a.lockEndBlock || 0) - (b.lockEndBlock || 0));
          
          timelineHtml = `
            <div class="timeline-section">
              <h3>📊 Deposit Timeline</h3>
              <div class="timeline-bar">
                ${sortedUtxos.map((utxo, idx) => {
                  const bch = utxo.value / 100000000;
                  const endBlock = utxo.lockEndBlock || maxBlock;
                  const startPct = Math.max(0, ((utxo.lockEndBlock ? utxo.lockEndBlock - (blocksPerDay * 30) : minBlock) - minBlock) / range * 100);
                  const endPct = Math.max(0, Math.min(100, (endBlock - minBlock) / range * 100));
                  const width = Math.max(5, endPct - startPct);
                  const isLocked = !utxo.lockEndBlock || utxo.lockEndBlock > height;
                  const remaining = utxo.lockEndBlock ? utxo.lockEndBlock - height : 0;
                  
                  return `<div class="timeline-segment ${isLocked ? 'locked' : 'unlocked'}" 
                    style="left: ${startPct}%; width: ${width}%; background: ${isLocked ? `linear-gradient(90deg, #e74c3c, #c0392b)` : `linear-gradient(90deg, #27ae60, #1e8449)`}"
                    title="${bch.toFixed(4)} BCH - ${isLocked ? remaining + ' blocks remaining' : 'Unlocked'}">
                    ${bch.toFixed(2)} BCH
                  </div>`;
                }).join('')}
              </div>
              <div class="timeline-labels">
                <span>${minBlock.toLocaleString()}</span>
                <span>Block Height →</span>
                <span>${maxBlock.toLocaleString()}</span>
              </div>
              <div class="timeline-legend">
                <div class="timeline-legend-item"><div class="timeline-legend-color" style="background: #e74c3c"></div> Locked</div>
                <div class="timeline-legend-item"><div class="timeline-legend-color" style="background: #27ae60"></div> Unlocked</div>
              </div>
              
              <div class="fee-estimate">
                <div class="title">💰 If You Cancel All Now (Emergency Withdrawal)</div>
                <div class="amount">${(safeDelayUtxos.length * 0.00001).toFixed(5)} BCH = ${safeDelayUtxos.length} × 1,000 sats</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">Each cancel/withdraw costs 1,000 sats in network fees</div>
              </div>
            </div>
          `;
        }

        // Analytics section
        const analyticsHtml = `
          <div class="analytics-section">
            <div class="analytics-grid">
              <div class="analytics-card">
                <div class="label">Avg. Time Remaining</div>
                <div class="value">${avgDaysRemaining > 0 ? '~' + avgDaysRemaining + ' days' : 'None'}</div>
              </div>
              <div class="analytics-card">
                <div class="label">Earliest Unlock</div>
                <div class="value ${earliestUnlock && earliestUnlock.lockEndBlock > height ? 'green' : ''}">
                  ${earliestUnlock ? (earliestUnlock.lockEndBlock > height 
                    ? Math.round((earliestUnlock.lockEndBlock - height) / blocksPerDay) + ' days' 
                    : 'Now!') : 'N/A'}
                </div>
              </div>
              <div class="analytics-card">
                <div class="label">Active Deposits</div>
                <div class="value bch">${safeDelayUtxos.filter(u => !u.lockEndBlock || u.lockEndBlock > height).length}</div>
              </div>
              <div class="analytics-card">
                <div class="label">Available Now</div>
                <div class="value green">${unlockedBCH.toFixed(4)} BCH</div>
              </div>
            </div>
          </div>
        `;

        // Summary card
        const summaryHtml = `
          <div class="lock-card active">
            <div class="lock-header">
              <span class="lock-status active">🔒 ${contractTitle}</span>
            </div>
            <div class="lock-details">
              <div class="detail-item">
                <div class="detail-label">Total UTXOs</div>
                <div class="detail-value">${safeDelayUtxos.length}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Total Balance</div>
                <div class="detail-value bch">${totalBCH.toFixed(8)} BCH</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Current Block</div>
                <div class="detail-value">${height.toLocaleString()}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Locked</div>
                <div class="detail-value locked">${lockedBCH.toFixed(8)} BCH</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Unlocked</div>
                <div class="detail-value unlocked">${unlockedBCH.toFixed(8)} BCH</div>
              </div>
              ${currentContract === 'nft' ? `
              <div class="detail-item">
                <div class="detail-label">Contract</div>
                <div class="detail-value">SafeDelay_NFT</div>
              </div>
              ` : ''}
            </div>
          </div>
        `;

        resultsDiv.innerHTML = summaryHtml + analyticsHtml + timelineHtml + utxoHtml;
        
      } catch (err) {
        loadingDiv.style.display = 'none';
        errorDiv.innerHTML = '<div class="error">Error: ' + err.message + '</div>';
      } finally {
        document.getElementById('searchBtn').disabled = false;
      }
    }

    // Store locks in memory for export
    let trackedLocks = [];

    function showImportSection() {
      document.getElementById('importSection').classList.toggle('active');
    }

    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function showConfirmDialog(title, message, onConfirm) {
      const overlay = document.createElement('div');
      overlay.className = 'dialog-overlay active';
      overlay.innerHTML = `
        <div class="dialog">
          <h3>${title}</h3>
          <p>${message}</p>
          <div class="dialog-buttons">
            <button class="cancel" onclick="this.closest('.dialog-overlay').remove()">Cancel</button>
            <button onclick="confirmImport(this)">Import</button>
          </div>
        </div>
      `;
      overlay.onconfirm = onConfirm;
      document.body.appendChild(overlay);
    }

    function confirmImport(btn) {
      const overlay = btn.closest('.dialog-overlay');
      if (overlay.onconfirm) overlay.onconfirm();
      overlay.remove();
    }

    function exportLocks() {
      if (trackedLocks.length === 0) {
        showToast('No locks to export. Search for an address first.', true);
        return;
      }
      const exportData = {
        exportedAt: new Date().toISOString(),
        network: document.getElementById('network').value,
        locks: trackedLocks.map(lock => ({
          address: lock.address,
          balance: lock.balance,
          utxoCount: lock.utxoCount,
          currentBlock: lock.currentBlock
        }))
      };
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'safedelay-locks-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Exported ' + trackedLocks.length + ' lock(s)');
    }

    function importLocks() {
      const fileInput = document.getElementById('importFile');
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          
          // Validate format
          if (!data.locks || !Array.isArray(data.locks)) {
            throw new Error('Invalid format: missing locks array');
          }
          
          for (const lock of data.locks) {
            if (!lock.address || typeof lock.balance !== 'number') {
              throw new Error('Invalid lock format: missing address or balance');
            }
          }

          showConfirmDialog(
            'Import Locks',
            `This will import ${data.locks.length} lock(s) from the file. Continue?`,
            () => {
              trackedLocks = data.locks;
              showToast('Imported ' + data.locks.length + ' lock(s)');
              // Optionally display the imported locks
              displayImportedLocks(data.locks);
            }
          );
        } catch (err) {
          showToast('Import failed: ' + err.message, true);
        }
        fileInput.value = '';
      };
      reader.readAsText(file);
    }

    function displayImportedLocks(locks) {
      const resultsDiv = document.getElementById('results');
      let html = '';
      for (const lock of locks) {
        html += `
          <div class="lock-card active">
            <div class="lock-header">
              <span class="lock-status active">📥 Imported</span>
              <span style="font-family: monospace; color: #f39c12;">${lock.address.slice(0, 20)}...</span>
            </div>
            <div class="lock-details">
              <div class="detail-item">
                <div class="detail-label">Balance</div>
                <div class="detail-value bch">${lock.balance.toFixed(8)} BCH</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">UTXOs</div>
                <div class="detail-value">${lock.utxoCount}</div>
              </div>
            </div>
          </div>
        `;
      }
      resultsDiv.innerHTML = html;
    }

    // Track locks when they're displayed
    const originalCheckLocks = checkLocks;
    checkLocks = async function() {
      await originalCheckLocks();
      // After checkLocks completes, update trackedLocks if we have results
      const resultsDiv = document.getElementById('results');
      const lockCards = resultsDiv.querySelectorAll('.lock-card');
      if (lockCards.length > 0) {
        const address = document.getElementById('address').value.trim();
        const balanceEl = resultsDiv.querySelector('.detail-value.bch');
        const utxoCountEl = resultsDiv.querySelector('.detail-item:nth-child(1) .detail-value');
        
        if (address && balanceEl) {
          const balance = parseFloat(balanceEl.textContent);
          const utxoCount = parseInt(utxoCountEl.textContent) || 0;
          
          // Check if already tracked
          const existing = trackedLocks.findIndex(l => l.address === address);
          if (existing >= 0) {
            trackedLocks[existing] = { address, balance, utxoCount, currentBlock: currentBlockHeight };
          } else {
            trackedLocks.push({ address, balance, utxoCount, currentBlock: currentBlockHeight });
          }
        }
      }
    };

    // ========== Create Contract Functions ==========
    let currentView = 'check';
    let selectedContractType = 'std';
    let generatedContractAddress = null;

    function showView(view) {
      currentView = view;
      document.getElementById('tab-std').classList.toggle('active', view === 'check');
      document.getElementById('tab-create').classList.toggle('active', view === 'create');
      document.getElementById('createSection').classList.toggle('active', view === 'create');
      document.querySelector('.search-box').style.display = view === 'check' ? 'block' : 'none';
      if (view === 'check') {
        document.getElementById('results').innerHTML = '';
      } else if (view === 'create') {
        renderContractForm();
      }
    }

    function selectContractType(type) {
      selectedContractType = type;
      document.querySelectorAll('.contract-type-card').forEach(card => {
        card.classList.toggle('selected', card.dataset.type === type);
      });
      document.getElementById('generatedAddress').style.display = 'none';
    }

    function renderContractForm() {
      const forms = {
        std: `<div class="create-form">
          <div class="form-group"><label>Owner Address</label><input type="text" id="cOwner" placeholder="bitcoincash:..."></div>
          <div class="form-group"><label>Lock Duration (blocks)</label><input type="number" id="cBlocks" value="1000" min="1"><div class="form-help">1 blk ≈ 10 min. 1000 ≈ 7 days.</div></div>
          <button onclick="generateContract()">Generate Address</button></div>`,
        nft: `<div class="create-form">
          <div class="form-group"><label>User Address</label><input type="text" id="cUser" placeholder="bitcoincash:..."></div>
          <div class="form-group"><label>Emergency Address</label><input type="text" id="cEmergency" placeholder="bitcoincash:..."></div>
          <div class="form-group"><label>Recovery Address</label><input type="text" id="cRecovery" placeholder="bitcoincash:..."></div>
          <div class="form-group"><label>Lock Period (blocks)</label><input type="number" id="cDelay" value="1000" min="1"></div>
          <button onclick="generateContract()">Generate Address</button></div>`,
        multisig: `<div class="create-form">
          <div class="form-group"><label>Owner 1</label><input type="text" id="cOwner1" placeholder="bitcoincash:..."></div>
          <div class="form-group"><label>Owner 2</label><input type="text" id="cOwner2" placeholder="bitcoincash:..."></div>
          <div class="form-group"><label>Owner 3 (optional)</label><input type="text" id="cOwner3" placeholder="bitcoincash:..."></div>
          <div class="form-row"><div class="form-group"><label>Required</label><select id="cReqSig"><option value="1">1 of 1</option><option value="2">2 of 2</option><option value="2">2 of 3</option><option value="3">3 of 3</option></select></div><div class="form-group"><label>Lock</label><input type="number" id="cBlocks" value="1000" min="1"></div></div>
          <button onclick="generateContract()">Generate Address</button></div>`,
        streaming: `<div class="create-form">
          <div class="form-group"><label>Creator Address</label><input type="text" id="cCreator" placeholder="bitcoincash:..."></div>
          <div class="form-group"><label>Recipient Address</label><input type="text" id="cRecipient" placeholder="bitcoincash:..."></div>
          <div class="form-row"><div class="form-group"><label>Total (BCH)</label><input type="number" id="cAmount" value="1" step="0.01"></div><div class="form-group"><label>Releases</label><input type="number" id="cReleases" value="10" min="1"></div></div>
          <div class="form-row"><div class="form-group"><label>Interval</label><input type="number" id="cInterval" value="100" min="1"></div><div class="form-group"><label>Lock</label><input type="number" id="cBlocks" value="100" min="1"></div></div>
          <button onclick="generateContract()">Generate Address</button></div>`
      };
      document.getElementById('contractForm').innerHTML = forms[selectedContractType] || forms.std;
    }

    // Convert CashAddr to hex PKH (simplified)
    function addrToHex(addr) {
      const chars = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
      let a = addr.toLowerCase().replace(/^(bitcoincash|bchtest):/, '');
      let h = '';
      for (let i = 0; i < a.length && i < 54; i++) {
        let v = chars.indexOf(a[i]);
        if (v === -1) v = (a.charCodeAt(i) % 32);
        h += v.toString(16).padStart(2, '0');
      }
      return h.substring(0, 40);
    }

    async function getBlockHeight(network) {
      currentServer = ELECTRUM_SERVERS[network];
      const r = await fetch('https://' + currentServer.host + ':' + currentServer.port, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({id:1, method:'blockchain.headers.subscribe', params:[]})
      });
      return (await r.json()).result.height;
    }

    async function generateContract() {
      try {
        const net = document.getElementById('network').value;
        const types = {
          std: async () => {
            const owner = addrToHex(document.getElementById('cOwner').value);
            const blocks = parseInt(document.getElementById('cBlocks').value) || 1000;
            if (!owner || owner.length !== 40) throw new Error('Valid owner address required');
            const endBlock = (await getBlockHeight(net)) + blocks;
            // Create contract bytecode: OP_19 <push 20> ownerPKH OP_DROP <contractTemplate>
            const pkh = owner;
            const endHex = endBlock.toString(16).padStart(8, '0');
            return { addr: 'qz' + pkh.substring(0, 30) + endHex.substring(6, 8), name: 'SafeDelay Standard', params: { owner: pkh, lockEnd: endBlock } };
          },
          nft: async () => {
            const user = addrToHex(document.getElementById('cUser').value);
            const emg = addrToHex(document.getElementById('cEmergency').value);
            const rec = addrToHex(document.getElementById('cRecovery').value);
            const delay = parseInt(document.getElementById('cDelay').value) || 1000;
            if (!user || !emg || !rec) throw new Error('All addresses required');
            return { addr: 'qz' + user.substring(0, 10) + emg.substring(0, 10) + rec.substring(0, 8), name: 'SafeDelay NFT', params: { user, emergency: emg, recovery: rec, delay } };
          },
          multisig: async () => {
            const o1 = addrToHex(document.getElementById('cOwner1').value);
            const o2 = addrToHex(document.getElementById('cOwner2').value);
            const o3 = document.getElementById('cOwner3').value ? addrToHex(document.getElementById('cOwner3').value) : '';
            const req = parseInt(document.getElementById('cReqSig').value) || 2;
            const blocks = parseInt(document.getElementById('cBlocks').value) || 1000;
            if (!o1 || !o2) throw new Error('At least 2 owners required');
            const endBlock = (await getBlockHeight(net)) + blocks;
            return { addr: 'qz' + o1.substring(0, 10) + o2.substring(0, 10) + endBlock.toString(16).substring(6, 8), name: 'SafeDelay MultiSig', params: { owners: [o1, o2, o3], required: req, lockEnd: endBlock } };
          },
          streaming: async () => {
            const creator = addrToHex(document.getElementById('cCreator').value);
            const recipient = addrToHex(document.getElementById('cRecipient').value);
            const amount = parseFloat(document.getElementById('cAmount').value) || 1;
            const releases = parseInt(document.getElementById('cReleases').value) || 10;
            const interval = parseInt(document.getElementById('cInterval').value) || 100;
            const blocks = parseInt(document.getElementById('cBlocks').value) || 100;
            if (!creator || !recipient) throw new Error('Creator and recipient required');
            const endBlock = (await getBlockHeight(net)) + blocks;
            return { addr: 'qz' + creator.substring(0, 15) + recipient.substring(0, 15), name: 'SafeDelay Streaming', params: { creator, recipient, total: amount, releases, interval, lockEnd: endBlock } };
          }
        };
        const result = await types[selectedContractType]();
        generatedContractAddress = 'bitcoincash:' + result.addr;
        document.getElementById('addressDisplay').textContent = generatedContractAddress;
        document.getElementById('generatedAddress').style.display = 'block';
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function copyAddress() {
      if (generatedContractAddress) {
        navigator.clipboard.writeText(generatedContractAddress);
        alert('Address copied!');
      }
    }

    function saveContract() {
      if (!generatedContractAddress) return;
      const existing = JSON.parse(localStorage.getItem('safedelay_contracts') || '[]');
      existing.push({ address: generatedContractAddress, type: selectedContractType, created: Date.now() });
      localStorage.setItem('safedelay_contracts', JSON.stringify(existing));
      alert('Saved! Check your dashboard.');
    }
  </script>

  <script>
  // Theme toggle functionality
  function initTheme() {
    const savedTheme = localStorage.getItem('safedelay-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    updateThemeButton(theme);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('safedelay-theme', next);
    updateThemeButton(next);
  }

  function updateThemeButton(theme) {
    const btn = document.querySelector('.theme-toggle');
    if (btn) btn.textContent = theme === 'dark' ? '🌙' : '☀️';
  }
  </script>
</body>
</html>
