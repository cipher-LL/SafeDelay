<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeDelay Status Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #eee;
      padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 2rem; font-size: 2rem; }
    h1 span { color: #f39c12; }
    .search-box {
      background: #0f0f23;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      border: 1px solid #333;
    }
    .search-box label { display: block; margin-bottom: 0.5rem; color: #aaa; font-size: 0.9rem; }
    .input-group { display: flex; gap: 0.5rem; }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a2e;
      color: #fff;
      font-family: monospace;
    }
    input:focus { outline: none; border-color: #f39c12; }
    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #f39c12;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #e67e22; }
    button:disabled { background: #666; cursor: not-allowed; }
    .results { display: flex; flex-direction: column; gap: 1rem; }
    .lock-card {
      background: #0f0f23;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid #333;
    }
    .lock-card.active { border-color: #27ae60; }
    .lock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .lock-status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .lock-status.active { background: #27ae60; color: #fff; }
    .lock-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .detail-item { background: #1a1a2e; padding: 0.75rem; border-radius: 8px; }
    .detail-label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 0.25rem; }
    .detail-value { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .detail-value.bch { color: #f39c12; }
    .empty-state { text-align: center; padding: 3rem; color: #666; }
    .loading { text-align: center; padding: 2rem; color: #f39c12; }
    .error { background: #2c0b0e; border: 1px solid #e74c3c; color: #e74c3c; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
    .network-select { margin-bottom: 1rem; }
    .network-select select { padding: 0.5rem; background: #1a1a2e; color: #fff; border: 1px solid #444; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SafeDelay <span>Status</span></h1>
    <div class="search-box">
      <div class="network-select">
        <select id="network">
          <option value="mainnet">Mainnet</option>
          <option value="testnet">Testnet</option>
        </select>
      </div>
      <label for="address">Enter address to check SafeDelay locks:</label>
      <div class="input-group">
        <input type="text" id="address" placeholder="bitcoincash:..." />
        <button id="searchBtn" onclick="checkLocks()">Check</button>
      </div>
    </div>
    <div id="error"></div>
    <div id="loading" class="loading" style="display: none;">Checking for SafeDelay locks...</div>
    <div id="results" class="results"></div>
  </div>

  <script>
    const ELECTRUM_SERVERS = {
      mainnet: { host: 'electrum.bch.cash', port: 50001 },
      testnet: { host: 'electrum-test.bch.cash', port: 60001 }
    };

    let currentServer = null;

    async function electrumCall(method, params = []) {
      const response = await fetch('https://' + currentServer.host + ':' + currentServer.port, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: 1, method, params })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      return data.result;
    }

    async function checkLocks() {
      const address = document.getElementById('address').value.trim();
      const network = document.getElementById('network').value;
      const errorDiv = document.getElementById('error');
      const loadingDiv = document.getElementById('loading');
      const resultsDiv = document.getElementById('results');

      errorDiv.innerHTML = '';
      resultsDiv.innerHTML = '';

      if (!address) {
        errorDiv.innerHTML = '<div class="error">Please enter an address</div>';
        return;
      }

      loadingDiv.style.display = 'block';
      document.getElementById('searchBtn').disabled = true;

      try {
        currentServer = ELECTRUM_SERVERS[network];
        const utxos = await electrumCall('blockchain.address.getUTXOs', [address]);
        
        if (!utxos || utxos.length === 0) {
          loadingDiv.style.display = 'none';
          resultsDiv.innerHTML = '<div class="empty-state"><p>No UTXOs found for this address.</p></div>';
          return;
        }

        // Filter for potential SafeDelay contracts (P2PKH scripts)
        const safeDelayUtxos = utxos.filter(utxo => {
          const script = utxo.script;
          return script && script.startsWith('76a914') && script.endsWith('88ac');
        });

        loadingDiv.style.display = 'none';

        if (safeDelayUtxos.length === 0) {
          resultsDiv.innerHTML = '<div class="empty-state"><p>No SafeDelay locks found for this address.</p></div>';
          return;
        }

        // Get current block height
        const currentBlock = await electrumCall('blockchain.headers.subscribe');
        const height = currentBlock.height;

        // Display results
        let totalBCH = 0;
        for (const utxo of safeDelayUtxos) {
          const bch = utxo.value / 100000000;
          totalBCH += bch;
        }

        resultsDiv.innerHTML = `
          <div class="lock-card active">
            <div class="lock-header">
              <span class="lock-status active">🔒 SafeDelay UTXOs Found</span>
            </div>
            <div class="lock-details">
              <div class="detail-item">
                <div class="detail-label">Total UTXOs</div>
                <div class="detail-value">${safeDelayUtxos.length}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Total Balance</div>
                <div class="detail-value bch">${totalBCH.toFixed(8)} BCH</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Current Block</div>
                <div class="detail-value">${height.toLocaleString()}</div>
              </div>
            </div>
          </div>
          <p style="text-align: center; color: #666; margin-top: 1rem; font-size: 0.9rem;">
            Note: This shows all P2PKH UTXOs. To see detailed lock status (lockEndBlock), 
            you would need to query the contract bytecode directly.
          </p>
        `;
      } catch (err) {
        loadingDiv.style.display = 'none';
        errorDiv.innerHTML = '<div class="error">Error: ' + err.message + '</div>';
      } finally {
        document.getElementById('searchBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
