<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeDelay - Cancel & Refund</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 2rem;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 1rem; }
        h1 span { color: #f39c12; }
        .subtitle { text-align: center; color: #888; margin-bottom: 2rem; }
        .card {
            background: #0f0f23;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 1.5rem;
        }
        label { display: block; margin-bottom: 0.5rem; color: #aaa; }
        input {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            margin-bottom: 1rem;
        }
        input:focus { outline: none; border-color: #f39c12; }
        button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        button:hover { background: #c0392b; }
        button.secondary { background: #34495e; color: #fff; }
        button.secondary:hover { background: #2c3e50; }
        .info-box {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid #e74c3c;
            margin-bottom: 1rem;
        }
        .result {
            background: #0f0f23;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #27ae60;
            margin-top: 1rem;
            display: none;
        }
        .result.show { display: block; }
        .result h3 { color: #27ae60; margin-bottom: 1rem; }
        .result pre { background: #1a1a2e; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Safe<span>Delay</span></h1>
        <p class="subtitle">Cancel & Get Full Refund</p>
        
        <div class="card">
            <div class="info-box">
                <strong>Instant Refund:</strong> You can cancel your time lock anytime and get your full balance back immediately. No waiting period required - works both before and after lock expiry.
            </div>
            
            <label for="contractAddress">SafeDelay Contract Address</label>
            <input type="text" id="contractAddress" placeholder="bitcoincash:..." />
            
            <label for="ownerAddress">Your Wallet Address (Owner)</label>
            <input type="text" id="ownerAddress" placeholder="bitcoincash:..." />
            
            <button onclick="cancelLock()">Cancel & Get Refund</button>
            <button class="secondary" onclick="window.location.href='./index.html'">← Back to Dashboard</button>
        </div>
        
        <div class="result" id="result">
            <h3>✓ Refund Initiated!</h3>
            <pre id="resultDetails"></pre>
        </div>
    </div>
    
    <script>
        function cancelLock() {
            const contractAddr = document.getElementById('contractAddress').value.trim();
            const ownerAddr = document.getElementById('ownerAddress').value.trim();
            
            if (!contractAddr) {
                alert('Please enter the contract address');
                return;
            }
            if (!ownerAddr) {
                alert('Please enter your wallet address');
                return;
            }
            
            const resultHtml = `
Contract Details:
  Contract: ${contractAddr.substring(0, 25)}...
  Owner: ${ownerAddr.substring(0, 25)}...

Refund Action:
  Calling cancel() function on the contract...
  
All locked funds will be returned to your address.
This closes the contract permanently.

In production:
  1. Sign transaction with owner private key
  2. Call cancel() function
  3. All funds sent to owner address
  4. Contract UTXO consumed (closed)
            `;
            
            document.getElementById('resultDetails').textContent = resultHtml;
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
