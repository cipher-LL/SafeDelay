<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeDelay - Extend Lock</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 2rem;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 1rem; }
        h1 span { color: #f39c12; }
        .subtitle { text-align: center; color: #888; margin-bottom: 2rem; }
        .card {
            background: #0f0f23;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 1.5rem;
        }
        label { display: block; margin-bottom: 0.5rem; color: #aaa; }
        input, select {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            margin-bottom: 1rem;
        }
        input:focus { outline: none; border-color: #f39c12; }
        button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            background: #f39c12;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        button:hover { background: #e67e22; }
        button.secondary { background: #34495e; color: #fff; }
        button.secondary:hover { background: #2c3e50; }
        .info-box {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid #f39c12;
            margin-bottom: 1rem;
        }
        .info-box strong { color: #e74c3c; }
        .result {
            background: #0f0f23;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #27ae60;
            margin-top: 1rem;
            display: none;
        }
        .result.show { display: block; }
        .result h3 { color: #27ae60; margin-bottom: 1rem; }
        .result pre { background: #1a1a2e; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Safe<span>Delay</span></h1>
        <p class="subtitle">Extend Your Time Lock</p>
        
        <div class="card">
            <div class="info-box">
                <strong>One-Way Extension:</strong> You can only extend to a LATER block height. Once extended, you cannot shorten the lock. This prevents hasty decisions about unlocking funds prematurely.
            </div>
            
            <label for="contractAddress">SafeDelay Contract Address</label>
            <input type="text" id="contractAddress" placeholder="bitcoincash:..." />
            
            <label for="currentEndBlock">Current Lock Expiry Block</label>
            <input type="number" id="currentEndBlock" placeholder="895000" />
            
            <label for="extendPeriod">Additional Lock Time</label>
            <select id="extendPeriod">
                <option value="4320">+1 month (4320 blocks)</option>
                <option value="12960">+3 months (12960 blocks)</option>
                <option value="25920">+6 months (25920 blocks)</option>
                <option value="51840">+1 year (51840 blocks)</option>
            </select>
            
            <button onclick="extendLock()">Extend Lock Period</button>
            <button class="secondary" onclick="window.location.href='./index.html'">← Back to Dashboard</button>
        </div>
        
        <div class="result" id="result">
            <h3>✓ Lock Extended!</h3>
            <pre id="resultDetails"></pre>
        </div>
    </div>
    
    <script>
        function extendLock() {
            const contractAddr = document.getElementById('contractAddress').value.trim();
            const currentEndBlock = parseInt(document.getElementById('currentEndBlock').value);
            const extendBlocks = parseInt(document.getElementById('extendPeriod').value);
            
            if (!contractAddr) {
                alert('Please enter the contract address');
                return;
            }
            if (!currentEndBlock || currentEndBlock <= 0) {
                alert('Please enter the current lock expiry block');
                return;
            }
            
            const newEndBlock = currentEndBlock + extendBlocks;
            
            const resultHtml = `
Current Lock Details:
  Contract: ${contractAddr.substring(0, 25)}...
  Current Expiry: Block ${currentEndBlock}

New Lock Details:
  Additional Time: ${extendBlocks} blocks (~${Math.round(extendBlocks * 10 / 60 / 24)} days)
  New Expiry: Block ${newEndBlock}

⚠️  This is a one-way operation. The lock can only be 
    extended further in the future, never shortened.

In production, this would:
  1. Call extend(newLockEndBlock) function
  2. Withdraw all funds from current contract
  3. Redeposit into new contract with extended lock
            `;
            
            document.getElementById('resultDetails').textContent = resultHtml;
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
